<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Selovox — AI-Powered Digital Product Platform</title>
    <meta name="description" content="Selovox turns your knowledge into sellable digital products in 60 seconds. AI-powered creation, built-in store, instant payouts. Join 120,000+ creators." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Selovox — Build & Sell Digital Products with AI" />
    <meta property="og:description" content="Create professional digital products, launch your store, and start earning — all powered by AI. Free to start." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Selovox — AI-Powered Digital Product Platform" />
    <meta name="twitter:description" content="Turn your knowledge into revenue. AI builds your product, store, and marketing in 60 seconds." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__errorCaught = false;
      function showError(msg, src, line, col, err) {
        if (window.__errorCaught) return;
        window.__errorCaught = true;
        var r = document.getElementById('root');
        if (r) {
          r.style.cssText = 'padding:32px;font-family:monospace;white-space:pre-wrap;background:#1e1e2e;color:#f38ba8;min-height:100vh;';
          r.textContent = 'SELOVOX RUNTIME ERROR\n\n' + msg + '\n\nSource: ' + (src||'') + ':' + (line||'') + ':' + (col||'') + '\n\n' + (err && err.stack ? err.stack : '');
        }
      }
      window.onerror = function(msg, src, line, col, err) { showError(msg, src, line, col, err); return false; };
      window.addEventListener('unhandledrejection', function(e) { showError('Unhandled Promise: ' + (e.reason && e.reason.message || e.reason), '', '', '', e.reason); });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
